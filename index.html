<!DOCTYPE html>
<html>
<head>
    <title>Pirating Website Simulation</title>
</head>
<body>
    <h1>Welcome to the Pirates' Den!</h1>
    <h2>What do you want to pirate today?</h2>
    <form action="pirate" method="get">
        <input type="text" name="item" placeholder="Enter the name of the item to pirate" required>
        <input type="submit" value="Pirate it!">
    </form>
    <hr>
    <h2>Recently Pirated Content</h2>
    <ul>
        <li><span style="color:red;">*</span>Potato, *Potato, Potato</li>
        <li><span style="color:red;">*</span>Banana, *Banana, Banana</li>
        <li><span style="color:red;">*</span>Beef, *Beef, Beef</li>
    </ul>
</body>
</html>
